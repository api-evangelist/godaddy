specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: GoDaddy
providerId: godaddy
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Domains
  - DNS
  - Registrar
description: GoDaddy enforces a uniform rate limit of 60 requests per minute on each API endpoint. Two
  environments are exposed - OTE for testing (api.ote-godaddy.com) and Production (api.godaddy.com). Certain
  product endpoints additionally require account eligibility thresholds (50+ domains for Availability;
  1+ domain or active Discount Domain Club Pro Plan for Management/DNS).
sources:
  - https://developer.godaddy.com/getstarted
responseCodes:
  throttled: 429
limits:
  - name: Per-endpoint rate limit
    scope: api-key
    metric: requests_per_minute
    limit: 60
    timeFrame: minute
    notes: Applies independently to each endpoint, not aggregated across the API.
  - name: Availability API eligibility
    scope: account
    metric: account_threshold
    limit: 50 domains in account
    notes: Production access to the Domain Availability endpoint requires the account to hold at least
      50 domains.
  - name: Management / DNS API eligibility
    scope: account
    metric: account_threshold
    limit: 1+ domain or active Discount Domain Club Domain Pro Plan
    notes: Production access requires either active domains or a Domain Pro Plan.
policies:
  - name: Backoff Strategy
    description: On 429 responses, back off and retry with jitter. Per-endpoint scoping means hot endpoints
      can throttle independently.
  - name: OTE vs Production
    description: Use api.ote-godaddy.com for development and testing. OTE shares the documented per-minute
      cap.
  - name: Funding requirement
    description: Purchase endpoints require a 'Good as Gold' funded account; orders fail without funded
      balance.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
