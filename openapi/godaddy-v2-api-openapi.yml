parameters:
  DomainParam:
    in: query
    name: domain
    required: false
    type: string
    description: 'Filter by domain name / common name.

      This will look for the text inside the content of the domain.

      This is not a "find domains that start with x" search.

      '
  certificateId:
    description: Certificate id to lookup
    in: path
    name: certificateId
    required: true
    type: string
  customerId:
    name: customerId
    description: An identifier for a customer
    in: path
    required: true
    type: string
  SubscriptionPageSize:
    default: '15'
    description: 'The number of records to return per query.

      '
    format: int32
    in: query
    name: pageSize
    required: false
    type: integer
  CertificateValidationTypeParam:
    in: query
    name: validation
    required: false
    default: ANY
    description: "The validation type for the certificate. \nStandard/Basic Validation (DV). \nOrganizational/Deluxe Vetting (OV).\nExtended/Premium Validation (EV).\n"
    enum:
    - ANY
    - DV
    - EV
    - OV
    type: string
  PageParam:
    name: page
    in: query
    required: false
    description: 'The page number. <b>(First page is <i>one</i> instead of zero.)</b>

      '
    default: '1'
    format: int32
    minimum: 1
    type: integer
  PageSizeParam:
    name: pageSize
    in: query
    required: false
    description: The number of records to return per query.
    format: int32
    type: integer
    default: '15'
  SubscriptionGuidParam:
    description: The Subscription GUID containing the certificates being requested.
    in: path
    name: guid
    required: true
    type: string
    default: 217c6432-b892-4d74-a75e-0e37b5dc30a0
  limit:
    name: limit
    required: false
    in: query
    type: integer
    format: integer-positive
    pattern: ^[0-9]+$
    description: Maximum number of items to return
  CertificateStatusParam:
    in: query
    name: status
    required: false
    default: ANY
    description: "The certificate lifecycle stage. <br>\nActive, Expired, and Revoked are all Issued certificates. <br>\nActive means the validity period includes today. <br>\nExpired means the validity period was prior to today. <br>\nRevoked means that the certificate has been revoked. <br>\nPending means that the certificate is still going through the issuance process and has not been signed or issued yet. <br>\nDenied means that the certificate went from pending to denied for any valid denial reason. \n(Customer canceled request, CAA records exist for the domain, fraud, etc...)\n"
    enum:
    - ANY
    - ACTIVE
    - DENIED
    - EXPIRED
    - PENDING
    - REVOKED
    type: string
  offset:
    name: offset
    required: false
    in: query
    type: integer
    format: integer-positive
    pattern: ^[0-9]+$
    description: Number of results to skip for pagination
  domain:
    in: path
    name: domain
    type: string
    format: domain
    description: A valid domain name in the certificate request
    required: true
  CertificateTypeParam:
    in: query
    name: type
    required: false
    default: ANY
    description: The type of certificate in terms of the number of applicable domains.
    enum:
    - ANY
    - SINGLE
    - UCC
    - WILDCARD
    type: string
