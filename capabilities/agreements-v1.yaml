naftiko: 1.0.0-alpha2
info:
  label: godaddy-agreements — v1
  description: 'godaddy-agreements — v1. 1 operations. Lead operation: Retrieve Legal Agreements for provided agreements keys.
    Self-contained Naftiko capability covering one Godaddy business surface.'
  tags:
  - Godaddy
  - v1
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GODADDY_API_KEY: GODADDY_API_KEY
capability:
  consumes:
  - type: http
    namespace: agreements-v1
    baseUri: https://api.ote-godaddy.com
    description: godaddy-agreements — v1 business capability. Self-contained, no shared references.
    resources:
    - name: v1-agreements
      path: /v1/agreements
      operations:
      - name: get
        method: GET
        description: Retrieve Legal Agreements for provided agreements keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Private-Label-Id
          in: header
          type: integer
          description: PrivateLabelId to operate as, if different from JWT
        - name: X-Market-Id
          in: header
          type: string
          description: Unique identifier of the Market used to retrieve/translate Legal Agreements
        - name: keys
          in: query
          type: array
          description: Keys for Agreements whose details are to be retrieved
          required: true
  exposes:
  - type: rest
    namespace: agreements-v1-rest
    port: 8080
    description: REST adapter for godaddy-agreements — v1. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/agreements
      name: v1-agreements
      description: REST surface for v1-agreements.
      operations:
      - method: GET
        name: get
        description: Retrieve Legal Agreements for provided agreements keys
        call: agreements-v1.get
        with:
          X-Private-Label-Id: rest.X-Private-Label-Id
          X-Market-Id: rest.X-Market-Id
          keys: rest.keys
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: agreements-v1-mcp
    port: 9090
    transport: http
    description: MCP adapter for godaddy-agreements — v1. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: retrieve-legal-agreements-provided-agreements
      description: Retrieve Legal Agreements for provided agreements keys
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: agreements-v1.get
      with:
        X-Private-Label-Id: tools.X-Private-Label-Id
        X-Market-Id: tools.X-Market-Id
        keys: tools.keys
      outputParameters:
      - type: object
        mapping: $.
