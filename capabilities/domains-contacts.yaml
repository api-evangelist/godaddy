naftiko: 1.0.0-alpha2
info:
  label: Domains API — Contacts
  description: 'Domains API — Contacts. 1 operations. Lead operation: Update domain contacts. Self-contained Naftiko capability
    covering one Godaddy business surface.'
  tags:
  - Godaddy
  - Contacts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GODADDY_API_KEY: GODADDY_API_KEY
capability:
  consumes:
  - type: http
    namespace: domains-contacts
    baseUri: https://api.ote-godaddy.com
    description: Domains API — Contacts business capability. Self-contained, no shared references.
    resources:
    - name: v2-customers-customerId-domains-domain-contacts
      path: /v2/customers/{customerId}/domains/{domain}/contacts
      operations:
      - name: patch
        method: PATCH
        description: Update domain contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Request-Id
          in: header
          type: string
          description: A client provided identifier for tracking this request.
        - name: customerId
          in: path
          type: string
          description: 'The Customer identifier<br/> Note: For API Resellers, performing actions on behalf of your customers,
            you need to specify the Subaccount you''re operating on beh'
          required: true
        - name: domain
          in: path
          type: string
          description: Domain whose Contacts are to be updated.
          required: true
        - name: body
          in: body
          type: string
          description: Changes to apply to existing Contacts
          required: true
  exposes:
  - type: rest
    namespace: domains-contacts-rest
    port: 8080
    description: REST adapter for Domains API — Contacts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v2/customers/{customerid}/domains/{domain}/contacts
      name: v2-customers-customerid-domains-domain-contacts
      description: REST surface for v2-customers-customerId-domains-domain-contacts.
      operations:
      - method: PATCH
        name: patch
        description: Update domain contacts
        call: domains-contacts.patch
        with:
          X-Request-Id: rest.X-Request-Id
          customerId: rest.customerId
          domain: rest.domain
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: domains-contacts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Domains API — Contacts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: update-domain-contacts
      description: Update domain contacts
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: domains-contacts.patch
      with:
        X-Request-Id: tools.X-Request-Id
        customerId: tools.customerId
        domain: tools.domain
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
