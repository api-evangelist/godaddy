        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-details-specified-subscription
      description: Update details for the specified Subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: subscriptions-v1.update
      with:
