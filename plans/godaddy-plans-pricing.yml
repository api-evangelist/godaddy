specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: GoDaddy
providerId: godaddy
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Domains
  - DNS
  - Certificates
  - Registrar
  - Aftermarket
description: GoDaddy does not publish a developer-portal price list with paid API tiers. API access is
  free with a GoDaddy account and gated by access type (Self-Serve vs Reseller) and product eligibility
  (e.g. Availability API requires 50+ domains, Management/DNS APIs require 1+ domain or an active Discount
  Domain Club Domain Pro Plan). All chargeable activity is the underlying registrar/SSL/domain product
  fee paid through a 'Good as Gold' funded account. Published API rate limit is 60 requests per minute
  per endpoint.
sources:
  - https://developer.godaddy.com/getstarted
  - https://developer.godaddy.com/
plans:
  - id: godaddy-self-serve
    name: Self-Serve API Access
    type: freemium
    description: Free API access for an individual GoDaddy account holder. Eligibility for purchase / production
      management endpoints requires meeting the documented domain thresholds.
    entries:
      - label: API access
        name: api_access
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Underlying product fees (domains, SSL, etc.)
        name: product_fees
        type: metered
        metric: product
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see GoDaddy storefront
        userMultiplied: false
    elements:
      - name: GoDaddy Domains API
      - name: GoDaddy Certificates API
      - name: GoDaddy Shoppers API
      - name: GoDaddy Subscriptions API
      - name: GoDaddy Orders API
      - name: GoDaddy Aftermarket API
      - name: GoDaddy Abuse API
      - name: GoDaddy Agreements API
      - name: GoDaddy Countries API
      - name: OTE (test) environment
      - name: Production environment
  - id: godaddy-reseller
    name: Reseller API Access
    type: enterprise
    description: API access for partners operating on behalf of customers via GoDaddy subaccounts. Requires
      partner enablement.
    entries:
      - label: Reseller program enrollment
        name: reseller_enrollment
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact GoDaddy reseller team
        userMultiplied: false
      - label: Underlying product fees
        name: product_fees
        type: metered
        metric: product
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: wholesale rates per agreement
        userMultiplied: false
    elements:
      - name: Subaccount management
      - name: Reseller storefront integration
      - name: GoDaddy Domains API
      - name: GoDaddy Certificates API
      - name: GoDaddy Shoppers API
      - name: GoDaddy Subscriptions API
      - name: GoDaddy Orders API
      - name: GoDaddy Aftermarket API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
