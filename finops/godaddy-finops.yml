specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: GoDaddy
providerId: godaddy
created: '2026-05-04'
modified: '2026-05-05'
tags:
  - FinOps
  - FOCUS
  - Domains
  - DNS
  - Registrar
reconciled: true
description: 'FOCUS-aligned FinOps for the GoDaddy API: API usage itself is free, but underlying product
  fees (domain registrations/renewals, SSL certificates, hosting) are charged per transaction against
  a Good as Gold funded account.'
sources:
  - https://developer.godaddy.com/getstarted
  - https://www.godaddy.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: GoDaddy.com, LLC
serviceCategory: Domains / DNS / Hosting
billingModel:
  pricingCategory: Pay-As-You-Go (Product Fees)
  billingFrequency: Per-Transaction
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Refund
    - Adjustment
focusColumns:
  ServiceName: GoDaddy API
  ServiceCategory: Domains / Registrar
  ProviderName: GoDaddy
  PublisherName: GoDaddy.com, LLC
  InvoiceIssuerName: GoDaddy.com, LLC
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: domain_registrations
    description: Domain registrations and renewals purchased through the API
    unit: domain-year
    aggregation: sum
    dimensions:
      - tld
      - duration_years
  - name: ssl_certificates
    description: SSL/TLS certificate purchases and renewals
    unit: certificate-year
    aggregation: sum
    dimensions:
      - certificate_type
  - name: aftermarket_purchases
    description: Premium / aftermarket domain acquisitions
    unit: transaction
    aggregation: sum
  - name: api_requests
    description: API call volume (informational - not billed)
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - environment
principles:
  - name: Visibility
    description: Use the Orders, Subscriptions, and Shoppers APIs to programmatically reconcile spending
      against the Good as Gold account ledger.
  - name: Allocation
    description: Tag domain purchases via account/sub-account structure when operating as a reseller;
      attribute SSL purchases to the requesting service.
  - name: Optimization
    description: Use multi-year registration discounts; consolidate certificates into wildcards; capture
      promo pricing surfaced in the Domains API rather than retail.
  - name: Accountability
    description: Domain owners or the platform team funding the Good as Gold account own renewal calendars
      and budget approvals; surface upcoming renewals in monthly reviews.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
